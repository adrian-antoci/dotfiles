# Kitty terminal configuration
# https://sw.kovidgoyal.net/kitty/conf/

font_family JetBrainsMono Nerd Font Mono
font_size 15
confirm_os_window_close 0

background #1e2228

# New tab inherits the current tab's working directory
map cmd+t new_tab_with_cwd
map ctrl+shift+t new_tab_with_cwd

# Tab bar styling
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1
tab_title_template "{index}: {title}"
active_tab_foreground   #1e2228
active_tab_background   #FF9248
active_tab_font_style   bold
inactive_tab_foreground #cfcfcf
inactive_tab_background #2c3e50
inactive_tab_font_style normal

# Navigate back/forward (Cmd+[ / Cmd+])
map super+[ send_key alt+left
map super+] send_key alt+right

# Window navigation (Cmd+h/j/k/l)
map super+h send_key alt+h
map super+j send_key alt+j
map super+k send_key alt+k
map super+l send_key alt+l


startup_session startup.conf

